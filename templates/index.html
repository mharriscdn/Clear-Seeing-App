<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clear Seeing</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<div id="app">

    <!-- LANDING SCREEN -->
    <div id="landing-screen">
        <div class="landing-inner">
            <h1 class="logo">CLEAR SEEING</h1>

            <img src="/static/assets/revolving-door.png" class="door-image" alt="Revolving door">

            <div class="headline">
                <div>Stop Pushing.</div>
                <div class="italic">The Next Move Is Obvious.</div>
            </div>

            <p class="subtext">Bring what&rsquo;s live.</p>

            <button id="start-btn" onclick="startSession()">BEGIN SESSION</button>

            <p class="landing-footer">
                credits: <span id="tank-value">—</span>
                &nbsp;&middot;&nbsp;
                <a href="#" onclick="manageBilling(event)">manage billing</a>
            </p>
        </div>
    </div>

    <!-- ORIENTATION SCREEN -->
    <div id="orientation-screen" style="display:none;">
        <div class="orientation-inner">
            <div class="session-header">
                <div class="session-logo">CLEAR SEEING</div>
                <div class="session-headline">
                    <div class="session-push">Stop Pushing.</div>
                    <div class="session-obvious">The Next Move Is Obvious.</div>
                </div>
            </div>
            <div class="session-divider"></div>
            <p class="session-prompt">What&rsquo;s in your central view right now?</p>
            <div class="orientation-input-wrap">
                <div class="orientation-input-row">
                    <textarea id="orientation-input" rows="3" onkeydown="handleOrientationKey(event)"></textarea>
                    <button id="orientation-send-btn" onclick="sendOrientationMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- CHAT AREA -->
    <div id="chat-area" style="display:none;">
        <div id="chat-header">
            <div class="session-logo">CLEAR SEEING</div>
            <div class="session-headline">
                <div class="session-push">Stop Pushing.</div>
                <div class="session-obvious">The Next Move Is Obvious.</div>
            </div>
            <div class="session-divider"></div>
        </div>
        <div id="situation-anchor" style="display:none;"></div>
        <div id="transcript"></div>
        <div id="input-row">
            <textarea id="user-input" placeholder="" rows="3" onkeydown="handleKey(event)"></textarea>
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

</div>

<script src="/static/app.js"></script>
</body>
</html>
